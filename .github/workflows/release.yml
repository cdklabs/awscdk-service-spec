    permissions:
      id-token: write
      contents: read
    environment: release
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          package-manager-cache: false
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          name: aws-cdk-aws-service-spec_build-artifact
      - name: Restore build artifact permissions
        run: cd dist && setfacl --restore=permissions-backup.acl
        continue-on-error: true
      - name: Release
        env:
          NPM_DIST_TAG: latest
          NPM_REGISTRY: registry.npmjs.org
          NPM_CONFIG_PROVENANCE: "true"
          NPM_TRUSTED_PUBLISHER: "true"
          PUBLIB_DRYRUN: ${{ inputs.dry_run }}
        run: npx -p publib@latest publib-npm
  aws-cdk-aws-service-spec_release_done:
    name: "@aws-cdk/aws-service-spec: Release complete"
    needs:
      - aws-cdk-aws-service-spec_release_github
      - aws-cdk-aws-service-spec_release_npm
    runs-on: ubuntu-latest
    permissions: {}
    if: ${{ !cancelled() && !failure() }}
    steps:
      - run: echo "All publish jobs complete"
